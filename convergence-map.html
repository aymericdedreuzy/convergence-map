<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convergence Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
  #topbar { background: #1e293b; padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; border-bottom: 1px solid #334155; z-index: 1000; }
  #topbar h1 { font-size: 1rem; font-weight: 700; color: #38bdf8; white-space: nowrap; }
  .btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn-blue { background: #3b82f6; color: white; }
  .btn-green { background: #22c55e; color: white; }
  .btn-red { background: #ef4444; color: white; }
  .btn-orange { background: #f97316; color: white; }
  .btn-gray { background: #475569; color: white; }
  #status { font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; background: #334155; color: #94a3b8; white-space: nowrap; }
  #status.live { background: #14532d; color: #4ade80; }
  #status.replay { background: #1e3a5f; color: #60a5fa; }
  #map { flex: 1; }
  #panel { position: absolute; top: 70px; left: 16px; z-index: 1000; background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 14px; width: 260px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: none; }
  #panel h2 { font-size: 0.85rem; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  #panel input, #panel select { width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 0.85rem; margin-bottom: 8px; }
  #panel label { font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 3px; }
  #participants-list { position: absolute; top: 70px; right: 16px; z-index: 1000; background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 14px; width: 200px; max-height: 400px; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: none; }
  #participants-list h2 { font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .participant-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #334155; font-size: 0.8rem; }
  .participant-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  #replay-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 12px 20px; display: none; align-items: center; gap: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); min-width: 400px; }
  #replay-bar.visible { display: flex; }
  #replay-slider { flex: 1; accent-color: #3b82f6; }
  #replay-time { font-size: 0.75rem; color: #94a3b8; white-space: nowrap; }
</style>
</head>
<body>

<div id="topbar">
  <h1>🗺️ Convergence Map</h1>
  <button class="btn btn-blue" id="btn-join">Rejoindre</button>
  <button class="btn btn-green" id="btn-create">Créer événement</button>
  <button class="btn btn-orange" id="btn-watch">Observer</button>
  <button class="btn btn-gray" id="btn-replay" style="display:none">⏪ Replay</button>
  <button class="btn btn-red" id="btn-stop" style="display:none">⏹ Stop</button>
  <span id="status">En attente</span>
</div>

<div id="map"></div>

<div id="panel">
  <h2 id="panel-title"></h2>
  <div id="panel-join" style="display:none">
    <label>Code événement</label>
    <input id="join-code" placeholder="ex: TEST01" />
    <label>Votre pseudo</label>
    <input id="join-pseudo" placeholder="ex: Marie" />
    <button class="btn btn-blue" style="width:100%" id="btn-do-join">Rejoindre & partager ma position</button>
  </div>
  <div id="panel-create" style="display:none">
    <label>Nom de l'événement</label>
    <input id="create-name" placeholder="ex: Pèlerinage 2025" />
    <label>Code d'accès</label>
    <input id="create-code" placeholder="ex: PELE2025" />
    <label>Durée (heures)</label>
    <input id="create-duration" type="number" value="8" min="1" max="72" />
    <button class="btn btn-green" style="width:100%" id="btn-do-create">Créer l'événement</button>
  </div>
  <div id="panel-watch" style="display:none">
    <label>Code événement</label>
    <input id="watch-code" placeholder="ex: TEST01" />
    <button class="btn btn-orange" style="width:100%" id="btn-do-watch">Observer en direct</button>
  </div>
  <button class="btn btn-gray" style="width:100%;margin-top:8px" id="btn-close-panel">Fermer</button>
</div>

<div id="participants-list">
  <h2>Participants <span id="count">0</span></h2>
  <div id="plist"></div>
</div>

<div id="replay-bar">
  <button class="btn btn-blue" style="padding:4px 10px;font-size:0.75rem" id="replay-play-btn">▶</button>
  <input type="range" id="replay-slider" min="0" max="100" value="0"/>
  <span id="replay-time">00:00:00</span>
  <select id="replay-speed">
    <option value="1">1x</option>
    <option value="5">5x</option>
    <option value="10" selected>10x</option>
    <option value="30">30x</option>
    <option value="60">60x</option>
  </select>
  <button class="btn btn-gray" style="padding:4px 10px;font-size:0.75rem" id="replay-stop-btn">✕</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAU9uBrrbbMbW2mvNobcxvbss1AgrhmIk",
  authDomain: "maps-convergence.firebaseapp.com",
  databaseURL: "https://maps-convergence-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "maps-convergence",
  storageBucket: "maps-convergence.firebasestorage.app",
  messagingSenderId: "923375501105",
  appId: "1:923375501105:web:7af5bdc9a1046ce5603a10"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const map = L.map('map').setView([46.2276, 2.2137], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

let currentEventCode = null;
let myParticipantId = null;
let trackingInterval = null;
let liveMarkers = {};
let liveUnsub = null;
let replayData = {};
let replayInterval = null;
let replayPlaying = false;
let replayIndex = 0;
let replayTimestamps = [];
let replaySpeed = 10;

const COLORS = ['#ef4444','#3b82f6','#22c55e','#f97316','#a855f7','#eab308','#06b6d4','#ec4899'];
const participantColors = {};
let colorIdx = 0;

function getColor(id) {
  if (!participantColors[id]) participantColors[id] = COLORS[colorIdx++ % COLORS.length];
  return participantColors[id];
}

function makeIcon(color) {
  return L.divIcon({
    html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 0 6px rgba(0,0,0,0.5)"></div>`,
    className: '', iconSize: [14,14], iconAnchor: [7,7]
  });
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}

function showPanel(mode) {
  document.getElementById('panel').style.display = 'block';
  ['join','create','watch'].forEach(m => document.getElementById('panel-'+m).style.display = m===mode?'block':'none');
  const titles = { join:'Rejoindre un événement', create:'Créer un événement', watch:'Observer en direct' };
  document.getElementById('panel-title').textContent = titles[mode];
}

function closePanel() {
  document.getElementById('panel').style.display = 'none';
}

function startWatching(code) {
  if (liveUnsub) liveUnsub();
  liveUnsub = onValue(ref(db, `positions/${code}`), snap => {
    const data = snap.val() || {};
    Object.keys(liveMarkers).forEach(id => {
      if (!data[id]) { map.removeLayer(liveMarkers[id]); delete liveMarkers[id]; }
    });
    const plist = document.getElementById('plist');
    plist.innerHTML = '';
    let count = 0;
    Object.entries(data).forEach(([id, p]) => {
      const color = getColor(id);
      if (liveMarkers[id]) {
        liveMarkers[id].setLatLng([p.lat, p.lng]);
      } else {
        liveMarkers[id] = L.marker([p.lat, p.lng], { icon: makeIcon(color) }).addTo(map).bindPopup(`<b>${p.pseudo}</b>`);
      }
      plist.innerHTML += `<div class="participant-item"><div class="participant-dot" style="background:${color}"></div>${p.pseudo}</div>`;
      count++;
    });
    document.getElementById('count').textContent = count;
    if (count === 1) {
      const first = Object.values(data)[0];
      map.setView([first.lat, first.lng], 13);
    }
  });
}

function renderReplayFrame(idx) {
  const ts = replayTimestamps[idx];
  Object.entries(replayData).forEach(([pid, entries]) => {
    const times = Object.keys(entries).map(Number).filter(t => t <= ts).sort((a,b) => b-a);
    if (!times.length) {
      if (liveMarkers[pid]) { map.removeLayer(liveMarkers[pid]); delete liveMarkers[pid]; }
      return;
    }
    const pos = entries[times[0]];
    const color = getColor(pid);
    if (liveMarkers[pid]) {
      liveMarkers[pid].setLatLng([pos.lat, pos.lng]);
    } else {
      liveMarkers[pid] = L.marker([pos.lat, pos.lng], { icon: makeIcon(color) }).addTo(map).bindPopup(`<b>${pos.pseudo||pid}</b>`);
    }
  });
  document.getElementById('replay-slider').value = idx;
  const elapsed = ts - replayTimestamps[0];
  const h = Math.floor(elapsed/3600000);
  const m = Math.floor((elapsed%3600000)/60000);
  const s = Math.floor((elapsed%60000)/1000);
  document.getElementById('replay-time').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// --- Event listeners ---

document.getElementById('btn-join').addEventListener('click', () => showPanel('join'));
document.getElementById('btn-create').addEventListener('click', () => showPanel('create'));
document.getElementById('btn-watch').addEventListener('click', () => showPanel('watch'));
document.getElementById('btn-close-panel').addEventListener('click', closePanel);

document.getElementById('btn-do-create').addEventListener('click', async () => {
  const name = document.getElementById('create-name').value.trim();
  const code = document.getElementById('create-code').value.trim().toUpperCase();
  const duration = parseInt(document.getElementById('create-duration').value) || 8;
  if (!name || !code) return alert('Remplis tous les champs');
  await set(ref(db, `events/${code}`), { name, code, createdAt: Date.now(), endsAt: Date.now() + duration*3600000, active: true });
  alert(`✅ Événement "${name}" créé !\nCode : ${code}`);
  closePanel();
});

document.getElementById('btn-do-join').addEventListener('click', async () => {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const pseudo = document.getElementById('join-pseudo').value.trim();
  if (!code || !pseudo) return alert('Remplis tous les champs');
  const snap = await get(ref(db, `events/${code}`));
  if (!snap.exists()) return alert('Événement introuvable');

  currentEventCode = code;
  const partRef = push(ref(db, `positions/${code}`));
  myParticipantId = partRef.key;

  setStatus(`📍 Live — ${pseudo} @ ${code}`, 'live');
  closePanel();
  document.getElementById('btn-stop').style.display = 'inline-block';
  document.getElementById('participants-list').style.display = 'block';
  startWatching(code);

  const writePos = () => {
    navigator.geolocation.getCurrentPosition(pos => {
      set(ref(db, `positions/${code}/${myParticipantId}`), { pseudo, lat: pos.coords.latitude, lng: pos.coords.longitude, ts: Date.now() });
      push(ref(db, `history/${code}/${myParticipantId}`), { pseudo, lat: pos.coords.latitude, lng: pos.coords.longitude, ts: Date.now() });
    }, err => console.warn(err), { enableHighAccuracy: true });
  };
  writePos();
  trackingInterval = setInterval(writePos, 5000);
});

document.getElementById('btn-do-watch').addEventListener('click', async () => {
  const code = document.getElementById('watch-code').value.trim().toUpperCase();
  if (!code) return alert('Entre un code');
  const snap = await get(ref(db, `events/${code}`));
  if (!snap.exists()) return alert('Événement introuvable');
  currentEventCode = code;
  setStatus(`👁 Observation — ${code}`, 'live');
  closePanel();
  document.getElementById('participants-list').style.display = 'block';
  document.getElementById('btn-replay').style.display = 'inline-block';
  startWatching(code);
});

document.getElementById('btn-stop').addEventListener('click', () => {
  if (trackingInterval) clearInterval(trackingInterval);
  if (liveUnsub) liveUnsub();
  Object.values(liveMarkers).forEach(m => map.removeLayer(m));
  liveMarkers = {};
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('participants-list').style.display = 'none';
  setStatus('En attente', '');
});

document.getElementById('btn-replay').addEventListener('click', async () => {
  if (!currentEventCode) return alert('Observe un événement d\'abord');
  setStatus('⏪ Chargement…', 'replay');
  const snap = await get(ref(db, `history/${currentEventCode}`));
  const raw = snap.val() || {};
  replayData = {};
  let allTs = new Set();
  Object.entries(raw).forEach(([pid, entries]) => {
    replayData[pid] = {};
    Object.values(entries).forEach(e => { replayData[pid][e.ts] = { lat: e.lat, lng: e.lng, pseudo: e.pseudo||pid }; allTs.add(e.ts); });
  });
  replayTimestamps = Array.from(allTs).sort((a,b) => a-b);
  if (replayTimestamps.length < 2) return alert('Pas assez de données pour un replay');
  Object.values(liveMarkers).forEach(m => map.removeLayer(m));
  liveMarkers = {};
  document.getElementById('replay-bar').classList.add('visible');
  document.getElementById('replay-slider').max = replayTimestamps.length - 1;
  replayIndex = 0;
  replayPlaying = false;
  renderReplayFrame(0);
  setStatus('⏪ Replay prêt', 'replay');
});

document.getElementById('replay-play-btn').addEventListener('click', () => {
  replayPlaying = !replayPlaying;
  document.getElementById('replay-play-btn').textContent = replayPlaying ? '⏸' : '▶';
  if (replayPlaying) {
    replayInterval = setInterval(() => {
      if (replayIndex >= replayTimestamps.length - 1) {
        replayPlaying = false; clearInterval(replayInterval);
        document.getElementById('replay-play-btn').textContent = '▶';
        return;
      }
      replayIndex++;
      renderReplayFrame(replayIndex);
    }, 200 / replaySpeed);
  } else {
    clearInterval(replayInterval);
  }
});

document.getElementById('replay-slider').addEventListener('input', e => {
  replayIndex = parseInt(e.target.value);
  renderReplayFrame(replayIndex);
});

document.getElementById('replay-speed').addEventListener('change', e => {
  replaySpeed = parseInt(e.target.value);
  if (replayPlaying) {
    clearInterval(replayInterval);
    replayInterval = setInterval(() => {
      if (replayIndex >= replayTimestamps.length - 1) { clearInterval(replayInterval); return; }
      replayIndex++;
      renderReplayFrame(replayIndex);
    }, 200 / replaySpeed);
  }
});

document.getElementById('replay-stop-btn').addEventListener('click', () => {
  clearInterval(replayInterval);
  replayPlaying = false;
  document.getElementById('replay-bar').classList.remove('visible');
  Object.values(liveMarkers).forEach(m => map.removeLayer(m));
  liveMarkers = {};
  setStatus('👁 Observation', 'live');
  if (currentEventCode) startWatching(currentEventCode);
});

</script>
</body>
</html>
